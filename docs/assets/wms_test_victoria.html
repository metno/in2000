<!DOCTYPE html>
<html lang="no">
<head>
<title>MapLibre WMS test</title>
<meta property="og:description" content="Eksempel på bruk av Victoria WMS i MapLibre" />
<meta charset='utf-8'>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel='stylesheet' href='https://unpkg.com/maplibre-gl@5.19.0/dist/maplibre-gl.css' />
<script src='https://unpkg.com/maplibre-gl@5.19.0/dist/maplibre-gl.js'></script>
<style>
        body { margin: 0; padding: 0; }
        html, body, #map { height: 100%; }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    var d = new Date();
    d.setHours(22,0,0,0); // set to later this evening
    var time = d.toISOString();
    var layer = 'air_temperature_2m_meps_det_vdiv_2_5km_calculations';
    var style = 'Temperature_2_m';
    var tile_url = 'https://public-victoria.met.no/wms?service=WMS&version=1.3.0&request=GetMap&layers=' + layer +
        '&crs=EPSG:3857&styles=' + style +
        '&format=image%2Fpng&transparent=true&time=' + time +
        '&width=256&height=256&bbox={bbox-epsg-3857}';
    //console.log(tile_url);
    const map = new maplibregl.Map({
        container: 'map',
        style: {
            version: 8,
            sources: {
                'wms-test-source': {
                    type: 'raster',
                    // use the tiles option to specify a WMS tile source URL
                    // https://maplibre.org/maplibre-style-spec/sources/
                    tiles: [ tile_url ],
                    tileSize: 256
                }
            },
            layers: [{
                id: 'wms-test-layer',
                type: 'raster',
                source: 'wms-test-source',
                paint: {}
            }]
        },
        zoom: 3,
        center: [15, 65]
    });
</script>
</body>
</html>
